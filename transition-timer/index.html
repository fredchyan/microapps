<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Timer">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Transition Timer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .container {
    text-align: center;
    width: 100%;
    max-width: 500px;
    padding: 2rem;
  }

  .start-btn {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 3px solid #333;
    background: radial-gradient(circle at 40% 35%, #1a1a2e, #0a0a0f);
    color: #888;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    -webkit-tap-highlight-color: transparent;
  }

  .start-btn:hover {
    border-color: #4ade80;
    color: #4ade80;
    box-shadow: 0 0 40px rgba(74, 222, 128, 0.15);
  }

  .start-btn:active {
    transform: scale(0.95);
    border-color: #4ade80;
    color: #4ade80;
  }

  .timer-view { display: none; }
  .timer-view.active { display: block; }
  .idle-view.hidden { display: none; }

  .phase-label {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 0.5rem;
    font-weight: 600;
  }

  .phase-sub {
    font-size: 0.8rem;
    opacity: 0.5;
    margin-bottom: 2rem;
    font-style: italic;
  }

  .time-display {
    font-size: 5rem;
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    letter-spacing: -2px;
    margin-bottom: 0.5rem;
    line-height: 1;
  }

  .progress-ring {
    width: min(300px, 75vw);
    height: min(300px, 75vw);
    margin: 0 auto 2rem;
    position: relative;
  }

  .progress-ring svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }

  .progress-ring .bg { fill: none; stroke: #1a1a2e; stroke-width: 4; }
  .progress-ring .fg { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.5s ease; }

  .timer-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 80%;
  }

  .phase-setup .fg { stroke: #4ade80; }
  .phase-setup .phase-label { color: #4ade80; }
  .phase-setup .time-display { color: #4ade80; }

  .phase-wrap .fg { stroke: #fbbf24; }
  .phase-wrap .phase-label { color: #fbbf24; }
  .phase-wrap .time-display { color: #fbbf24; }

  .phase-focus .fg { stroke: #f87171; }
  .phase-focus .phase-label { color: #f87171; }
  .phase-focus .time-display { color: #f87171; }

  .phase-done .fg { stroke: #818cf8; }
  .phase-done .phase-label { color: #818cf8; }
  .phase-done .time-display { color: #818cf8; }

  .glow {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
    height: 400px;
    border-radius: 50%;
    opacity: 0.08;
    pointer-events: none;
    transition: background 0.5s ease;
  }

  .phase-setup .glow { background: radial-gradient(circle, #4ade80, transparent); }
  .phase-wrap .glow { background: radial-gradient(circle, #fbbf24, transparent); }
  .phase-focus .glow { background: radial-gradient(circle, #f87171, transparent); }
  .phase-done .glow { background: radial-gradient(circle, #818cf8, transparent); }

  .controls {
    margin-top: 2rem;
    display: flex;
    gap: 1rem;
    justify-content: center;
  }

  .ctrl-btn {
    padding: 0.8rem 2rem;
    border-radius: 12px;
    border: 1px solid #333;
    background: #111;
    color: #888;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-btn:active { background: #222; color: #ccc; }

  .ctrl-btn.primary {
    border-color: #4ade80;
    color: #4ade80;
  }

  .log-section {
    margin-top: 3rem;
    text-align: left;
    max-height: 150px;
    overflow-y: auto;
  }

  .log-section h3 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #444;
    margin-bottom: 0.5rem;
  }

  .log-entry {
    font-size: 0.75rem;
    color: #555;
    padding: 0.4rem 0;
    border-bottom: 1px solid #111;
    display: flex;
    justify-content: space-between;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.08; }
    50% { opacity: 0.15; }
  }

  .pulse .glow { animation: pulse 2s ease-in-out infinite; }
</style>
</head>
<body>
<div class="container">
  <div class="idle-view">
    <button class="start-btn" id="startBtn">I just<br>sat down</button>
    <div class="log-section" id="logSection" style="display:none">
      <h3>Today's transitions</h3>
      <div id="logEntries"></div>
    </div>
  </div>

  <div class="timer-view" id="timerView">
    <div class="glow"></div>
    <div class="progress-ring">
      <svg viewBox="0 0 300 300">
        <circle class="bg" cx="150" cy="150" r="140"/>
        <circle class="fg" id="progressFg" cx="150" cy="150" r="140"/>
      </svg>
      <div class="timer-content">
        <div class="phase-label" id="phaseLabel">Setup Zone</div>
        <div class="time-display" id="timeDisplay">25:00</div>
        <div class="phase-sub" id="phaseSub">get comfortable</div>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="cancelBtn">Cancel</button>
      <button class="ctrl-btn primary" id="doneBtn">I'm working</button>
    </div>
  </div>
</div>

<script>
const TOTAL = 25 * 60;
const SETUP_END = 20 * 60;
const WRAP_END = 15 * 60;
const CIRCUMFERENCE = 2 * Math.PI * 140;

const phases = [
  { name: 'setup', until: SETUP_END, label: 'Setup Zone', sub: 'headphones, music, open docs — this counts' },
  { name: 'wrap', until: WRAP_END, label: 'Wrap Up Setup', sub: 'start focusing in' },
  { name: 'focus', until: 0, label: 'You Should Be Working', sub: 'no more stalling' },
];

let timer = null;
let remaining = TOTAL;
let startTime = null;
let logs = JSON.parse(localStorage.getItem('transition-logs') || '[]');
let lastPhase = null;

const startBtn = document.getElementById('startBtn');
const timerView = document.getElementById('timerView');
const idleView = document.querySelector('.idle-view');
const timeDisplay = document.getElementById('timeDisplay');
const phaseLabel = document.getElementById('phaseLabel');
const phaseSub = document.getElementById('phaseSub');
const progressFg = document.getElementById('progressFg');
const cancelBtn = document.getElementById('cancelBtn');
const doneBtn = document.getElementById('doneBtn');
const logSection = document.getElementById('logSection');
const logEntries = document.getElementById('logEntries');

progressFg.style.strokeDasharray = CIRCUMFERENCE;
progressFg.style.strokeDashoffset = 0;

// Haptic feedback
function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function renderLogs() {
  const today = new Date().toDateString();
  const todayLogs = logs.filter(l => new Date(l.time).toDateString() === today);
  if (todayLogs.length === 0) { logSection.style.display = 'none'; return; }
  logSection.style.display = 'block';
  logEntries.innerHTML = todayLogs.map(l => {
    const t = new Date(l.time);
    const timeStr = t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const mins = Math.floor(l.setupSeconds / 60);
    const secs = l.setupSeconds % 60;
    return `<div class="log-entry">
      <span>${timeStr}</span>
      <span>${mins}:${String(secs).padStart(2,'0')} setup</span>
    </div>`;
  }).join('');
}

function getPhase() {
  for (const p of phases) {
    if (remaining > p.until) return p;
  }
  return { name: 'done', until: 0, label: 'Time\'s Up', sub: 'hopefully you\'re deep in it' };
}

function updateDisplay() {
  const mins = Math.floor(remaining / 60);
  const secs = remaining % 60;
  timeDisplay.textContent = `${mins}:${String(secs).padStart(2, '0')}`;

  const progress = 1 - (remaining / TOTAL);
  progressFg.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);

  const phase = getPhase();

  // Vibrate on phase change
  if (lastPhase && lastPhase !== phase.name) {
    vibrate(phase.name === 'focus' ? [100, 50, 100] : [50]);
  }
  lastPhase = phase.name;

  phaseLabel.textContent = phase.label;
  phaseSub.textContent = phase.sub;
  timerView.className = `timer-view active phase-${phase.name}`;

  if (phase.name === 'wrap' || phase.name === 'focus') {
    timerView.classList.add('pulse');
  }
}

function start() {
  remaining = TOTAL;
  startTime = Date.now();
  lastPhase = null;
  idleView.classList.add('hidden');
  timerView.classList.add('active');
  vibrate(50);
  updateDisplay();

  // Keep screen awake
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
  }

  timer = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      finish(true);
      return;
    }
    updateDisplay();
  }, 1000);
}

function finish(natural) {
  clearInterval(timer);
  timer = null;

  const setupSeconds = Math.floor((Date.now() - startTime) / 1000);
  if (startTime && setupSeconds > 5) {
    logs.push({ time: new Date().toISOString(), setupSeconds, completed: natural });
    localStorage.setItem('transition-logs', JSON.stringify(logs));
  }

  if (natural) vibrate([100, 50, 100, 50, 100]);

  timerView.classList.remove('active');
  timerView.className = 'timer-view';
  idleView.classList.remove('hidden');
  renderLogs();
}

startBtn.addEventListener('click', start);
cancelBtn.addEventListener('click', () => finish(false));
doneBtn.addEventListener('click', () => finish(true));

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

renderLogs();
</script>
</body>
</html>
